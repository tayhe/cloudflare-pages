<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            color: #eaeaea;
            font-family: "Courier New", monospace;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .code {
            font-size: 8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #e94560, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .emoji {
            font-size: 4rem;
            margin: 1rem 0;
        }
        .msg {
            font-size: 1.1rem;
            color: #888;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <div class="emoji">( ˘•ω•˘ )</div>
        <div class="msg">这里什么都没有～</div>
    </div>
</body>
</html>
